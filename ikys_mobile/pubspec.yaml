name: ikys_mobile
description: İKYS - İnsan Kaynakları Yönetim Sistemi (Mobil)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  dio: ^5.4.0                    # HTTP (axios karşılığı)
  flutter_secure_storage: ^9.0.0 # Token saklama (expo-secure-store karşılığı)
  provider: ^6.1.1              # Durum yönetimi (React Context karşılığı)
  go_router: ^13.2.0            # Yönlendirme (expo-router karşılığı)
  mobile_scanner: ^4.0.1        # QR okuma (expo-camera karşılığı)
  geolocator: ^11.0.0           # Konum (expo-location karşılığı)
  intl: ^0.20.2                 # Tarih biçimleme
  flutter_local_notifications: ^17.2.3  # Yerel heads-up bildirim (önemli/çok önemli)
  firebase_core: ^3.6.0         # Firebase çekirdek
  firebase_messaging: ^15.1.3   # FCM push (uygulama kapalıyken bildirim)
  file_picker: ^10.3.3          # Masraf fişi/faturası seçimi (PDF/resim)
  path_provider: ^2.1.4         # Geçici dosya dizini (indirilen fiş için)
  open_filex: ^4.5.0            # İndirilen fişi varsayılan uygulamada açma

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
